[agent]
host_id = "test-host"

[output]
data_dir = "./data"
write_events = true

[collectors.auth_log]
enabled = true
path = "./testdata/sample-auth.log"

[collectors.integrity]
enabled = true
poll_seconds = 2
paths = [
  "./testdata/watched/sshd_config",
  "./testdata/watched/sudoers",
]

[detectors.ssh_bruteforce]
enabled = true
threshold = 5
window_seconds = 300

kind: detector
name: docker_anomaly
version: 1
description: "Detects container rapid restarts and OOM kills by counting container.die/oom events per container"

context: |
  Monitors container.oom and container.die events. When a container has
  rapid restarts or OOM kills within a sliding window, an incident fires.

  Severity depends on OOM presence:
  - At least one OOM in the burst: High
  - Only die events (rapid restarts): Medium

  OOM kills are a stronger signal because they can indicate memory
  corruption exploits or resource abuse (cryptominer exceeding limits).

behavior:
  does:
    - "Counts container.die and container.oom events per container_id"
    - "Fires Medium severity for rapid restarts (die-only)"
    - "Fires High severity when OOM is present in the burst"
    - "Includes container_name, image, has_oom in evidence"
  does_not:
    - "Alert on container.start or other non-die/oom events"
    - "Alert below threshold"
    - "Re-alert for same container within window"
    - "Mix events between different containers"

config:
  threshold: 3
  window_secs: 300

dependencies: []

test_cases:
  true_positives:
    - description: "3 container.die events (rapid restarts)"
      input:
        kind: "container.die"
        container_id: "abc123"
        count: 3
      expected:
        alert: true
        severity: "medium"

    - description: "2 die + 1 OOM"
      input:
        events:
          - { kind: "container.die", container_id: "abc123" }
          - { kind: "container.oom", container_id: "abc123" }
          - { kind: "container.die", container_id: "abc123" }
      expected:
        alert: true
        severity: "high"

  true_negatives:
    - description: "container.start event"
      input:
        kind: "container.start"
        container_id: "abc123"
      expected:
        alert: false
        reason: "Only die and oom events are counted"

    - description: "Only 2 events (below threshold)"
      input:
        kind: "container.die"
        container_id: "abc123"
        count: 2
      expected:
        alert: false
        reason: "Below threshold of 3"

history:
  - "2026-04-02: initial spec from source code analysis"

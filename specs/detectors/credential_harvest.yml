kind: detector
name: credential_harvest
version: 1
description: "Detects credential harvesting via /proc memory access, known tools, and suspicious command patterns"

context: |
  Three detection methods:
  1. /proc/{pid}/mem|maps|environ reads (eBPF file.read_access) — process
     reading another process's memory for credential extraction.
  2. Known credential tools (mimipenguin, lazagne, linpeas, pspy, etc.) in
     commands or comm names.
  3. Command patterns: "strings /proc", "cat /proc/*/environ".

  Severity:
  - /proc/*/mem read or known tool: Critical
  - /proc/*/environ, /proc/*/maps, strings/cat patterns: High

  Key decisions:
  - Self-access skipped (pid reading its own /proc/pid/mem).
  - /proc/self/environ in commands skipped (common in shell scripts).
  - Allowlisted processes: perf, bpftool, bpftrace, systemd, systemd-journal,
    node_exporter, prometheus.
  - Non-numeric /proc paths ignored (/proc/cpuinfo, /proc/net/).

behavior:
  does:
    - "Fires Critical on /proc/*/mem reads and known credential tools"
    - "Fires High on /proc/*/environ, /proc/*/maps reads by non-self processes"
    - "Fires High on strings /proc and cat /proc/*/environ commands"
    - "Container-aware: includes container_id if present"
  does_not:
    - "Alert on self-access (pid reading its own /proc/pid/*)"
    - "Alert on /proc/self/environ in commands"
    - "Alert on allowlisted processes (perf, bpftool, bpftrace, systemd)"
    - "Alert on non-sensitive /proc subpaths (/proc/*/status)"
    - "Alert on non-numeric /proc paths (/proc/cpuinfo)"

config:
  cooldown_secs: 600

dependencies: []

test_cases:
  true_positives:
    - description: "Process reading another process's memory"
      input:
        kind: "file.read_access"
        comm: "evil"
        filename: "/proc/1234/mem"
        pid: 5000
      expected:
        alert: true
        severity: "critical"

    - description: "mimipenguin execution"
      input:
        kind: "shell.command_exec"
        comm: "mimipenguin"
        command: "./mimipenguin.sh"
      expected:
        alert: true
        severity: "critical"

  true_negatives:
    - description: "Process reading its own memory"
      input:
        kind: "file.read_access"
        comm: "app"
        filename: "/proc/1234/mem"
        pid: 1234
      expected:
        alert: false
        reason: "Self-access is skipped"

    - description: "perf reading /proc/*/maps (allowlisted)"
      input:
        kind: "file.read_access"
        comm: "perf"
        filename: "/proc/1234/maps"
        pid: 5003
      expected:
        alert: false
        reason: "perf is in ALLOWLISTED_PROCESSES"

  false_positive_fixes:
    - date: "2026-04-02"
      description: "Legitimate profiling tools accessing /proc"
      context: |
        perf, bpftool, bpftrace, and node_exporter legitimately read
        /proc/*/maps and /proc/*/mem for profiling and monitoring. Without
        the allowlist, every perf run would trigger Critical alerts.
      input:
        kind: "file.read_access"
        comm: "bpftool"
        filename: "/proc/1234/mem"
        pid: 5004
      expected:
        alert: false

history:
  - "2026-04-02: initial spec from source code analysis"

kind: detector
name: credential_stuffing
version: 1
description: "Detects credential stuffing by counting distinct usernames in failed SSH attempts from a single IP"

context: |
  Unlike brute force (many attempts, same user), credential stuffing tries
  many different usernames from a single IP — a leaked credential list being
  replayed. This is a stronger signal than brute force because it shows the
  attacker has a pre-compiled list.

  Always fires at High severity because username spray is rarely bot noise —
  it indicates a targeted attack with a credential database.

  Key decisions:
  - Tracks unique usernames per source IP, not just attempt count.
  - Internal IPs excluded (same rationale as ssh_bruteforce).
  - Empty usernames are skipped (malformed events).
  - Repeated failures with the same username do NOT increase unique count
    (prevents confusion with brute force on a single account).

behavior:
  does:
    - "Counts distinct usernames in ssh.login_failed events per source IP"
    - "Fires High severity when unique username count reaches threshold"
    - "Suppresses re-alerts for same IP within window"
  does_not:
    - "Alert on ssh.login_success events"
    - "Alert on internal IPs"
    - "Alert when same username is repeated (no unique count increase)"
    - "Alert below the unique username threshold"

config:
  threshold: 3
  window_secs: 300

dependencies: []

test_cases:
  true_positives:
    - description: "3 distinct usernames from same IP"
      input:
        kind: "ssh.login_failed"
        ip: "1.2.3.4"
        users: ["alice", "bob", "carol"]
      expected:
        alert: true
        severity: "high"

    - description: "5 distinct usernames from same IP"
      input:
        kind: "ssh.login_failed"
        ip: "5.6.7.8"
        users: ["admin", "root", "ubuntu", "deploy", "test"]
      expected:
        alert: true
        severity: "high"

  true_negatives:
    - description: "Same username repeated 10 times (brute force, not stuffing)"
      input:
        kind: "ssh.login_failed"
        ip: "1.2.3.4"
        users: ["root", "root", "root"]
      expected:
        alert: false
        reason: "Only 1 unique username — not credential stuffing"

    - description: "Internal IP with many distinct users"
      input:
        kind: "ssh.login_failed"
        ip: "10.0.0.5"
        users: ["alice", "bob", "carol"]
      expected:
        alert: false
        reason: "Internal IPs are excluded"

history:
  - "2026-04-02: initial spec from source code analysis"

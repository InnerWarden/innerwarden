kind: collector
name: osquery_log
version: 1
description: "Tails osquery result log and maps scheduled query results to InnerWarden events"

context: |
  Tails the osquery result log file using byte-offset cursor with 1-second
  polling. Parses osquery JSON result format including query name, action
  (added/removed), columns, and timestamps. Uses spawn_blocking for file I/O.
  Optional integration for environments already running osquery.

behavior:
  does:
    - "Parses osquery JSON result log lines"
    - "Maps query names and actions to InnerWarden event kinds"
    - "Extracts column data from differential query results"
    - "Handles log rotation (file not found returns empty result)"
  does_not:
    - "Does not start or manage osqueryd"
    - "Does not configure osquery packs or schedules"
    - "Does not deduplicate with native InnerWarden detectors"

output:
  event_kinds:
    - kind: "osquery.result"
      fields: [name, action, columns, unix_time, calendar_time]

config:
  path: "/var/log/osquery/osqueryd.results.log"
  poll_interval: "1s"
  cursor: "byte offset (persisted via shared AtomicU64)"

history:
  - "2026-04-02: initial spec"
